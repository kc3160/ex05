
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.spring
    image: ufund-api:latest
    restart: unless-stopped
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.ng
    image: ufund-ui:latest
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend