<div id="form-container" [ngSwitch]="current">
    <div class="text_link" *ngSwitchCase="1">
        <app-registration-form></app-registration-form>
        <p>Do you already have an account? <a (click)="changeTo(0)">Login here.</a></p>
    </div>
    <div class="text_link" *ngSwitchCase="0">
        <app-login></app-login>
        <p>Are you new? <a (click)="changeTo(1)"> Register here.</a></p>
    </div>
</div>
